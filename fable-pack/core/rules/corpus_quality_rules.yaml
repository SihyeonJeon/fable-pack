pack_version: 0.4-max
golden_candidate_requires:
  - human_review.rating in [exemplary, normal]
  - context_log_status is VERIFIED
  - bypass_events empty
  - input_snapshot.yaml exists
  - repo_snapshot.yaml exists
  - corpus_quality_gate passes
fable_golden:
  allowed_ratings: [exemplary, normal]
flawed_examples:
  allowed_ratings: [flawed]
shadow_deltas:
  requires:
    - fable_trace_ref
    - fallback_trace_ref
    - missed_by_fallback taxonomy
distilled_rules:
  every_delta_must_convert_to_one_of:
    - schema
    - gate
    - playbook
    - invariant
    - example
